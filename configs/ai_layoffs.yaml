    effects:
      - { operator: decrement, target: "project.gameplay_feel", by: 15 }
      - { operator: increment, target: "project.hidden_bug_count", by: 5 }
      - { operator: emit_event, type: "知识断裂",
          detail: "老周走了，交接文档只写了不到一半。核心架构的实现细节、支付系统的边界条件、那些'不要碰这里'的原因——全部永久丢失。从今往后遇到问题只能猜。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  # ==========================================================
  # 阿雯身体线
  # ==========================================================

  阿雯手抖:
