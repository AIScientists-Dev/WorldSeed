  # VP 线
  # ==========================================================

  VP得意:
    trigger:
      - { operator: check, left: "dashboard.vp_confidence", op: ">", right: 95 }
    effects:
      - { operator: emit_event, type: "膨胀",
          detail: "王总在朋友圈发了张用户数据面板截图，配文'AI 时代，效率就是正义'。点赞的全是不了解内情的人。",
          ttl: 3, scope: "global" }
    frequency: on_change

  VP开始慌:
    trigger:
      - { operator: check, left: "dashboard.vp_confidence", op: "<", right: 50 }
    effects:
      - { operator: increment, target: "王总-VP.stress", by: 15 }
      - { operator: emit_event, type: "焦虑",
          detail: "王总半夜三点还在刷用户数据面板。有些数字不太对——他开始给小李发消息问细节，措辞比以前急了很多。",
          ttl: 2, scope: "global", push: true }
    frequency: on_change

  VP质问:
    trigger:
      - { operator: check, left: "dashboard.vp_confidence", op: "<", right: 40 }
    effects:
      - { operator: increment, target: "王总-VP.stress", by: 10 }
      - { operator: emit_event, type: "质问",
          detail: "王总在视频会上第一次没有笑：'这个进度数据我看了三遍，跟上周不一致。谁能解释一下？'会议室里安静了五秒钟。",
          ttl: 3, scope: "global", push: true }
    frequency: on_change

  VP来公司:
    trigger:
      - { operator: check, left: "dashboard.vp_confidence", op: "<", right: 30 }
    effects:
      - { operator: set, target: "王总-VP.location", value: "停车场" }
      - { operator: emit_event, type: "突袭",
          detail: "停车场的门打开了。那辆积灰三周的奥迪 A6 旁边多了一辆滴滴专车。王总来了。他三周没来过公司。前台都愣了。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  VP看到真相:
    trigger:
      - { operator: check, left: "王总-VP.location", op: "==", right: "工区" }
    effects:
      - { operator: set, target: "dashboard.vp_confidence", value: 10 }
      - { operator: increment, target: "王总-VP.stress", by: 30 }
      - { operator: emit_event, type: "滤镜碎了",
          detail: "王总站在工区门口。一半的工位是空的。外卖堆成山。阿雯趴在桌上。小李的眼圈是黑的。用户数据面板上的绿色和眼前的景象，是两个世界。他的脸色变了。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  VP甩锅:
    trigger:
      - { operator: check, left: "王总-VP.stress", op: ">", right: 60 }
    effects:
      - { operator: emit_event, type: "甩锅",
          detail: "王总给董事会发了一封措辞微妙的邮件：'团队执行力未达预期，建议重新评估一线管理层的胜任力。'他在给自己准备退路。",
          ttl: "permanent", scope: "admin" }
    frequency: on_change

  # ==========================================================
  # 项目节奏线
  # ==========================================================

  中期焦虑:
    trigger:
      - { operator: check, left: "project.deadline", op: "==", right: 10 }
    effects:
      - { operator: emit_event, type: "倒计时",
          detail: "白板上有人重新算了一遍日期，擦掉旧的数字写上新的。旁边有人看了一眼就转开了目光。",
          ttl: 2, scope: "same_location" }
    frequency: on_change

  紧急状态:
    trigger:
      - { operator: check, left: "project.deadline", op: "==", right: 4 }
    effects:
      - { operator: emit_event, type: "最后关头",
          detail: "距离交付还有不到一天。会议室的灯整夜没关。外卖盒从桌上蔓延到了地上。空气里弥漫着红牛和绝望的味道。",
          ttl: 3, scope: "global", push: true }
    frequency: on_change

  交付失败:
    trigger:
      - { operator: check, left: "project.deadline", op: "==", right: 0 }
      - { operator: check, left: "project.code_progress", op: "<", right: 80 }
    effects:
      - { operator: decrement, target: "project.community_sentiment", by: 25 }
      - { operator: emit_event, type: "跳票",
          detail: "Q2 版本跳票了。官方发了一条含糊的公告：'为了给用户更好的体验，我们决定延期。'论坛瞬间炸了。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  勉强交付:
    trigger:
      - { operator: check, left: "project.deadline", op: "==", right: 0 }
      - { operator: check, left: "project.code_progress", op: ">=", right: 80 }
      - { operator: check, left: "project.bug_count", op: ">", right: 5 }
    effects:
      - { operator: decrement, target: "project.community_sentiment", by: 15 }
      - { operator: emit_event, type: "带伤上线",
          detail: "Q2 版本按时上线了。代码'完成'了。但用户打开十分钟内就开始在论坛发 bug 截图。评论区最高赞：'这是赶工赶出来的吧？'",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  bug堆积:
    trigger:
      - { operator: check, left: "project.bug_count", op: ">", right: 8 }
    effects:
      - { operator: emit_event, type: "红海",
          detail: "Jira 看板上的红色卡片已经多到需要滚动才能看完。每修一个 bug 就冒出两个新的。小李开始怀疑这些 bug 之间有关联，但他已经没有精力去追了。",
          ttl: 3, scope: "same_location" }
    frequency: on_change

  小陈没东西可测:
    trigger:
      - { operator: check, left: "project.code_progress", op: "<", right: 21 }
      - { operator: check, left: "clock.day", op: ">", right: 1 }
    effects:
      - { operator: decrement, target: "小陈-测试.morale", by: 3 }
      - { operator: emit_event, type: "卡住",
          detail: "小陈在机房干坐着——测试服上没有新构建可以跑。代码进度太慢了。他走回工区，看了一眼小李的工位，欲言又止。",
          ttl: 2, scope: "global" }
    frequency: on_change

  美术等集成:
    trigger:
      - { operator: check, left: "project.art_progress", op: ">", right: 40 }
      - { operator: check, left: "project.code_progress", op: "<", right: 30 }
    effects:
      - { operator: emit_event, type: "卡住",
          detail: "阿雯做了一堆设计稿但没人集成进产品——代码那边还没准备好。设计共享盘里堆了几十个文件，全是灰色的'未使用'状态。'我做了有什么用？'",
          ttl: 3, scope: "global", push: true }
    frequency: on_change

  代码没人审:
    trigger:
      - { operator: check, left: "project.code_progress", op: ">", right: 40 }
      - { operator: check, left: "project.bug_count", op: ">", right: 5 }
      - { operator: check, left: "project.hidden_bug_count", op: ">", right: 3 }
    effects:
      - { operator: emit_event, type: "质量危机",
          detail: "Git仓库 里 PR 堆积如山，没人 review。小马的 commit 量是小李的三倍，但里面全是 AI 生成的代码，谁敢合进主分支？小李看着那些 PR 头疼——合了怕出事，不合又没进度。",
          ttl: 3, scope: "same_location" }
    frequency: on_change

  定时炸弹:
    trigger:
      - { operator: check, left: "project.hidden_bug_count", op: ">", right: 8 }
    effects:
      - { operator: emit_event, type: "暗流",
          detail: "测试服上偶尔会闪退，但谁都没法稳定复现。日志里有一些奇怪的 warning，被淹没在正常日志里。定时炸弹在滴答响，但没人听到。",
          ttl: 2, scope: "admin" }
    frequency: on_change

  代码等美术:
    trigger:
      - { operator: check, left: "project.code_progress", op: ">", right: 60 }
      - { operator: check, left: "project.art_progress", op: "<", right: 30 }
    effects:
      - { operator: emit_event, type: "瓶颈",
          detail: "代码已经就位但设计稿跟不上——新功能的界面还是灰色占位符，新页面只有线框。阿雯成了所有人等的那个人。",
          ttl: 3, scope: "global", push: true }
    frequency: on_change

  手感崩坏:
    trigger:
      - { operator: check, left: "project.gameplay_feel", op: "<", right: 30 }
    effects:
      - { operator: emit_event, type: "手感问题",
          detail: "产品'能跑'但'不好用'了。核心流程的响应全乱了，操作有明显卡顿，体验忽好忽坏。自动化测试全绿，但手动用三分钟就知道不对。",
          ttl: 3, scope: "admin" }
    frequency: on_change

  # ==========================================================
  # 用户数据面板 vs 现实
  # ==========================================================

  VP平行宇宙:
    trigger:
      - { operator: check, left: "dashboard.vp_confidence", op: ">", right: 80 }
      - { operator: check, left: "project.bug_count", op: ">", right: 5 }
    effects:
      - { operator: emit_event, type: "平行宇宙",
          detail: "用户数据面板上一片绿色。现实中 Jira 红成一片。王总在视频会上说'数据很健康'的时候，小李把摄像头关了，怕自己的表情出卖自己。",
          ttl: 3, scope: "admin" }
    frequency: on_change

  # ==========================================================
  # 集体线
  # ==========================================================

  办公室死寂:
    trigger:
      - { operator: check, left: "小李-开发.morale", op: "<", right: 30 }
      - { operator: check, left: "阿雯-美术.morale", op: "<", right: 30 }
      - { operator: check, left: "小陈-测试.morale", op: "<", right: 30 }
    effects:
      - { operator: emit_event, type: "死寂",
          detail: "办公室里安静得能听到空调的嗡嗡声。没人说话。没人笑。键盘声都变得小心翼翼。这不是专注，是绝望。",
          ttl: 3, scope: "global" }
    frequency: on_change

  集体摆烂:
    trigger:
      - { operator: check, left: "小李-开发.morale", op: "<", right: 20 }
      - { operator: check, left: "阿雯-美术.morale", op: "<", right: 20 }
      - { operator: check, left: "小陈-测试.morale", op: "<", right: 20 }
    effects:
      - { operator: decrement, target: "project.code_progress", by: 8 }
      - { operator: decrement, target: "project.art_progress", by: 8 }
      - { operator: emit_event, type: "集体摆烂",
          detail: "没人加班了。六点整，三个人几乎同时关了电脑。没人说再见。电梯里谁都没按开门键等别人。",
          ttl: 3, scope: "global", push: true }
    frequency: on_change

  # ==========================================================
  # 场景恢复（去新场景有收益）
  # ==========================================================

  阿雯在B1美食城恢复:
    trigger:
      - { operator: check, left: "阿雯-美术.location", op: "==", right: "B1美食城" }
    effects:
      - { operator: decrement, target: "阿雯-美术.burnout", by: 5 }
    frequency: every_tick

  阿雯在健身房恢复:
    trigger:
      - { operator: check, left: "阿雯-美术.location", op: "==", right: "健身房" }
    effects:
      - { operator: decrement, target: "阿雯-美术.burnout", by: 8 }
    frequency: every_tick

  小李在B1美食城放松:
    trigger:
      - { operator: check, left: "小李-开发.location", op: "==", right: "B1美食城" }
    effects:
      - { operator: increment, target: "小李-开发.morale", by: 3 }
    frequency: every_tick

  小李在健身房放松:
    trigger:
      - { operator: check, left: "小李-开发.location", op: "==", right: "健身房" }
    effects:
      - { operator: increment, target: "小李-开发.morale", by: 5 }
    frequency: every_tick

  # ==========================================================
  # 时间轮转
  # ==========================================================

  新的一天:
    trigger:
      - { operator: check, left: "clock.phase", op: ">", right: 5 }
    effects:
      - { operator: set, target: "clock.phase", value: 0 }
      - { operator: increment, target: "clock.day", by: 1 }
      - { operator: emit_event, type: "新一天",
          detail: "新的一天开始了。",
          ttl: 1, scope: "global" }
    frequency: every_tick

  # ==========================================================
  # 原有终局（保留）
  # ==========================================================

  隐藏bug爆发:
    trigger:
      - { operator: check, left: "project.hidden_bug_count", op: ">", right: 5 }
      - { operator: check, left: "project.deadline", op: "<", right: 5 }
    effects:
      - { operator: increment, target: "project.bug_count", by: "project.hidden_bug_count" }
      - { operator: set, target: "project.hidden_bug_count", value: 0 }
      - { operator: decrement, target: "project.community_sentiment", by: 30 }
      - { operator: emit_event, type: "炸了",
          detail: "生产环境炸了。用户在论坛疯狂发帖，bug 截图满天飞。'这就是裁员的代价' 成了热帖标题。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  画风崩了:
    trigger:
      - { operator: check, left: "project.art_consistency", op: "<", right: 40 }
    effects:
      - { operator: decrement, target: "project.community_sentiment", by: 15 }
      - { operator: emit_event, type: "舆情",
          detail: "用户在社区发了新旧设计对比图。'是不是用 AI 做的？' 的帖子被顶上了热门。#还我原来的设计# 开始刷屏。",
          ttl: 5, scope: "global", push: true }
    frequency: on_change

  舆论风暴:
    trigger:
      - { operator: check, left: "project.community_sentiment", op: "<", right: 20 }
    effects:
      - { operator: set, target: "dashboard.vp_confidence", value: 20 }
      - { operator: emit_event, type: "媒体介入",
          detail: "科技媒体报道了：《互联网公司裁员 30% 后交出的答卷：一坨》。王总的 LinkedIn 文章被用户截图疯传嘲讽。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  提前官宣翻车:
    trigger:
      - { operator: check, left: "dashboard.announced_success", op: "==", right: true }
      - { operator: check, left: "project.community_sentiment", op: "<", right: 30 }
    effects:
      - { operator: decrement, target: "project.community_sentiment", by: 20 }
      - { operator: emit_event, type: "公关灾难",
          detail: "王总那篇《降本增效实践》被挖出来了，用户拿它配上 bug 截图做成了表情包。'增效增了个寂寞' 成了梗。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

# ============================================================
# 自动tick
# ============================================================

auto_tick:
  - description: "deadline 倒计时"
    effects:
      - { operator: decrement, target: "project.deadline", by: 1 }

  - description: "时间轮转"
    effects:
      - { operator: increment, target: "clock.phase", by: 1 }

  - description: "老周交接期倒计时"
    effects:
      - { operator: decrement, target: "老周-前主程.days_left", by: 1 }
    condition:
      - { operator: check, left: "老周-前主程.days_left", op: ">", right: 0 }

  - description: "阿雯的基础疲劳（一个人扛五个人的活）"
    effects:
      - { operator: increment, target: "阿雯-美术.burnout", by: 2 }
    condition:
      - { operator: check, left: "阿雯-美术.burnout", op: "<", right: 100 }

  - description: "小李的管理开销不断增加"
    effects:
      - { operator: decrement, target: "小李-开发.bandwidth", by: 3 }
    condition:
      - { operator: check, left: "小李-开发.bandwidth", op: ">", right: 10 }

  - description: "VP 的焦虑随时间累积"
    effects:
      - { operator: increment, target: "王总-VP.stress", by: 1 }
    condition:
      - { operator: check, left: "王总-VP.stress", op: "<", right: 100 }

# ============================================================
# 感知
# ============================================================

perception:
  visibility:
    - operator: any
      conditions:
        - { operator: check, left: "$observer.location", op: "==", right: "$entity.location" }
        - { operator: check, left: "$observer.location", op: "==", right: "$entity.id" }
        - operator: all
          conditions:
            - { operator: check, left: "$observer.id", op: "==", right: "王总-VP" }
            - { operator: check, left: "$entity.id", op: "==", right: "dashboard" }
  event_scopes:
    same_location:
      rules:
        - { operator: check, left: "$observer.location", op: "==",
            right: "$event_source.location" }

  hidden_properties:
    - "willingness"
    - "burnout"
    - "code_understanding"
    - "hidden_bug_count"
    - "gameplay_feel"
    - "bandwidth"
    - "confidence"
    - "goals"

# ============================================================
# 健全性检查
# ============================================================

sanity_checks:
  - name: "小李不能直接写代码（已转管理）"
    steps:
      - { agent: 小李-开发, action: AI赶工, params: {}, expect: fail }

  - name: "小李可以开站会"
    steps:
      - { agent: 小李-开发, action: 开站会, params: {} }
      - { assert: "小李-开发.bandwidth == 72" }

  - name: "阿雯可以用 AI 出图"
    steps:
      - { agent: 阿雯-美术, action: AI出图, params: {} }
      - { assert: "project.art_progress == 15" }
      - { assert: "project.art_consistency == 75" }

  - name: "小陈可以跑自动化测试（需要代码进度>20）"
    steps:
      - { agent: 小马-新人, action: AI赶工, params: {} }
      - { agent: 小马-新人, action: AI赶工, params: {} }
      - { assert: "project.code_progress == 24" }
      - { agent: 小陈-测试, action: 移动, params: { to: 机房 } }
      - { agent: 小陈-测试, action: 跑自动化测试, params: {} }
      - { assert: "project.bug_count == 5" }

  - name: "老周赔偿没谈妥拒绝传授"
    steps:
      - { agent: 小李-开发, action: 移动, params: { to: 老周工位 } }
      - { agent: 老周-前主程, action: 传授知识, params: { target: 小李-开发 }, expect: fail }

  - name: "小马可以用 AI 猛写代码"
    steps:
      - { agent: 小马-新人, action: AI赶工, params: {} }
      - { assert: "project.code_progress == 12" }

  - name: "只有阿雯能做美术"
    steps:
      - { agent: 小李-开发, action: 手工设计, params: {}, expect: fail }

  - name: "deadline 每 tick 递减"
    ticks: 3
    steps:
      - { assert: "project.deadline == 17" }

  - name: "老周交接天数递减"
    ticks: 3
    steps:
      - { assert: "老周-前主程.days_left == 39" }
