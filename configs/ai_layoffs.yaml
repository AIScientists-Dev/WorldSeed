    trigger:
      - { operator: check, left: "阿雯-美术.burnout", op: ">", right: 95 }
    effects:
      - { operator: decrement, target: "project.art_progress", by: 5 }
      - { operator: emit_event, type: "停工",
          detail: "阿雯的手腕疼到拿不住笔了。她坐在工位上对着空白的屏幕，一笔都画不下去。七年来第一次。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

