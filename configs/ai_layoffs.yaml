      - { operator: decrement, target: "阿雯-美术.morale", by: 10 }
      - { operator: decrement, target: "小陈-测试.morale", by: 5 }
      - { operator: emit_event, type: "摊牌",
          detail: "老周在茶水间接水时突然开口了：'你们知道这个项目交出去会怎样吗？我知道，因为我写了一半的代码。但没人问我。祝你们好运。'说完头也不回走了。",
          ttl: "permanent", scope: "global", push: true }
