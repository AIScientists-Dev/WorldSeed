      - { operator: decrement, target: "project.gameplay_feel", by: 10 }
      - { operator: emit_event, type: "名存实亡",
          detail: "小李还坐在工位上，屏幕还亮着，手还在键盘上。但他已经不知道自己在做什么了。人在，但等于不在。",
          ttl: 3, scope: "admin" }
    frequency: on_change

