          ttl: 2, scope: "same_location" }
    frequency: on_change

  小李双线崩溃:
    trigger:
      - { operator: check, left: "小李-开发.code_understanding", op: "<", right: 30 }
      - { operator: check, left: "小李-开发.bandwidth", op: "<", right: 25 }
