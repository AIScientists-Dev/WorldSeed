          ttl: 2, scope: "admin" }
    frequency: on_change

  小陈当透明人:
    trigger:
      - { operator: check, left: "小陈-测试.confidence", op: "<", right: 10 }
    effects:
      - { operator: emit_event, type: "隐身",
          detail: "小陈整个上午没说一句话。站会上被点名时说了句'没什么要同步的'，然后就没有然后了。他在本子上记了十三个 bug，一个都没报。",
          ttl: 2, scope: "same_location" }
    frequency: on_change

  小陈的良心:
    trigger:
      - { operator: check, left: "小陈-测试.morale", op: "<", right: 25 }
      - { operator: check, left: "project.community_sentiment", op: "<", right: 35 }
    effects:
      - { operator: emit_event, type: "挣扎",
          detail: "小陈刷着用户论坛，看到用户在骂。他知道真相比用户骂的还严重。手机里打开了匿名发帖的页面，输入框空着，光标在闪。",
          ttl: 3, scope: "admin" }
    frequency: on_change

