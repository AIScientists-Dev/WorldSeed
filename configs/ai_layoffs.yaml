      - { operator: emit_event, type: "离职",
          detail: "老周收拾完最后一个纸箱，把工牌放在桌上，头也不回地走了。十五年的知识跟着他出了门。桌上那座 2019 年的奖杯没带走。",
          ttl: "permanent", scope: "global", push: true }
    frequency: on_change

  知识永久丢失:
    trigger:
      - { operator: check, left: "老周-前主程.days_left", op: "<=", right: 0 }
