      - { operator: check, left: "阿雯-美术.burnout", op: ">", right: 50 }
    effects:
      - { operator: emit_event, type: "疲劳",
          detail: "阿雯的手开始肉眼可见地发抖。她握着数位笔画了一条线，删掉，再画，又删掉。停下来攥了攥拳头。",
          ttl: 2, scope: "same_location" }
    frequency: on_change

  阿雯趴桌:
    trigger:
      - { operator: check, left: "阿雯-美术.burnout", op: ">", right: 65 }
    effects:
      - { operator: emit_event, type: "濒临崩溃",
          detail: "阿雯趴在桌上睡着了，手里还握着笔。屏幕上的画稿停在一半。路过的人看了一眼，没敢叫醒她。",
          ttl: 2, scope: "same_location" }
    frequency: on_change

  美术崩溃:
    trigger:
      - { operator: check, left: "阿雯-美术.burnout", op: ">", right: 80 }
