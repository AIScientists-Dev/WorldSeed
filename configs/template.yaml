  #     - { operator: check, left: "food_supply.quantity", op: "<", right: 5 }
  #   effects:
  #     - { operator: emit_event, type: warning, detail: "Food is running low!", scope: global, push: true, ttl: 3 }
  #   frequency: on_change             # on_change (default) | every_tick
  #   # dm:                            # Optional. DM judges when consequence triggers.
  #   #   hint: "Describe the impact of low food on the group."

# --- Highlights: observer dashboard markers ---
# Like consequences, but only produce chapter markers — no effects.
highlights: {}
  # tension_rising:
  #   trigger:
  #     - { operator: check, left: "food_supply.quantity", op: "<", right: 10 }
  #   label: "Food supply critical"    # Text shown in chapter panel
  #   frequency: on_change             # on_change (default) | every_tick

# --- Auto-tick: every-tick changes ---
# Effects that run automatically each tick. Optional condition guard.
auto_tick: []
  # - description: "Food decays each tick"
  #   effects:
  #     - { operator: decrement, target: "food_supply.quantity", by: 1, min: 0 }
  #   # condition:                     # Optional guard — only run if all pass
  #   #   - { operator: check, left: "food_supply.quantity", op: ">", right: 0 }

# --- Perception: who sees what ---
perception:
  visibility: []                       # Empty = everyone sees everything.
    # - { operator: check, left: "$observer.location", op: "==", right: "$entity.location" }
    # Context vars: $observer (the viewing agent), $entity (the thing being viewed)

  hidden_properties: []                # Properties stripped from other agents' view.
    # - secret_plan
    # - mood
    # Each agent still sees their OWN hidden properties in self_state.

  # event_scopes:                      # Custom event delivery rules.
  #   same_location:
  #     rules:
  #       - { operator: check, left: "$observer.location", op: "==",
  #           right: "$event_source.location" }
  #   # Built-in scopes (no config needed): global, target_only, admin

  wake_summary:                        # What state info appears in agent wake notifications.
    # self_fields: []                  # Agent's own properties. null=don't show, []=all
    # entities: {}                     # {entity_id: [fields]}. Show specific entities.
    # entity_types: {}                 # {type: [fields]}. Show entities by type (dynamic).
    # agent_fields: []                 # Other agents' fields. null=don't show, []=all

