repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        require_serial: true
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        require_serial: true
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy src
        require_serial: true
        language: system
        types: [python]
        pass_filenames: false

  # pytest runs in CI only (.github/workflows/ci.yml).
  # Reason: too slow for pre-commit (0.5-2s), and every project
  # (FastAPI, Pydantic, Flask, Polars) does it this way.
