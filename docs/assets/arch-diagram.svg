<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 680" width="920" height="680">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
<path d="M 0 1 L 9 5 L 0 9 Z" fill="#475569"/>
</marker>
<marker id="arrow-loop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
<path d="M 0 1 L 9 5 L 0 9 Z" fill="#94A3B8"/>
</marker>
</defs>
<rect width="920" height="680" rx="12" fill="#f5f4f0"/>


<!-- Row 0: Describe a world (y=24) -->
<rect x="300" y="24" width="260" height="44" rx="10" stroke="#475569" stroke-width="1.5" fill="#ffffff"/>
<text x="430" y="51" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">Describe a world</text>

<!-- Arrow A→B (big gap: setup → runtime) -->
<path d="M 430 68 L 430 128" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Row 1: World ticks forward (y=132) -->
<rect x="300" y="132" width="260" height="44" rx="10" stroke="#475569" stroke-width="1.5" fill="#ffffff"/>
<text x="430" y="159" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">World ticks forward</text>

<!-- Fan-out (B bottom=176) -->
<path d="M 430 176 L 160 218" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<path d="M 430 176 L 430 218" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<path d="M 430 176 L 700 218" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>

<!-- Row 2: Perceive (y=222) -->
<rect x="70" y="222" width="180" height="42" rx="8" stroke="#475569" stroke-width="1.2" fill="#ffffff"/>
<text x="160" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">agent A perceives</text>

<rect x="340" y="222" width="180" height="42" rx="8" stroke="#475569" stroke-width="1.2" fill="#ffffff"/>
<text x="430" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">agent B perceives</text>

<rect x="610" y="222" width="180" height="42" rx="8" stroke="#475569" stroke-width="1.2" fill="#ffffff"/>
<text x="700" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">agent C perceives</text>

<!-- Perceive → Act (small gap: same agent, continuous) -->
<path d="M 160 264 L 160 306" stroke="#475569" stroke-width="1.2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
<path d="M 430 264 L 430 306" stroke="#475569" stroke-width="1.2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
<path d="M 700 264 L 700 306" stroke="#475569" stroke-width="1.2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>

<!-- Row 3: Act (y=310) -->
<rect x="70" y="310" width="180" height="42" rx="8" stroke="#475569" stroke-width="1.2" fill="#ffffff"/>
<text x="160" y="336" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">agent A acts</text>

<rect x="340" y="310" width="180" height="42" rx="8" stroke="#475569" stroke-width="1.2" fill="#ffffff"/>
<text x="430" y="336" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">agent B acts</text>

<rect x="610" y="310" width="180" height="42" rx="8" stroke="#475569" stroke-width="1.2" fill="#ffffff"/>
<text x="700" y="336" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#334155" text-anchor="middle">agent C acts</text>

<!-- Fan-in (act bottom=352, diamond top=398, gap=46 matching B→perceive) -->
<path d="M 160 352 C 160 382, 340 395, 355 416" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<path d="M 430 352 L 430 398" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<path d="M 700 352 C 700 382, 520 395, 505 416" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>

<!-- Row 4: Diamond (top=398, center=436, bottom=474) -->
<polygon points="270,436 430,398 590,436 430,474" stroke="#475569" stroke-width="1.5" fill="#ffffff"/>
<text x="430" y="431" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">Outcome</text>
<text x="430" y="450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">certain?</text>

<!-- Yes / No (diamond bottom=474) -->
<path d="M 350 455 L 240 510" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<text x="260" y="478" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#475569" text-anchor="middle">Yes</text>

<path d="M 510 455 L 620 510" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<text x="600" y="478" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#475569" text-anchor="middle">No</text>

<!-- Row 5: DSL / DM (y=514) -->
<rect x="110" y="514" width="240" height="46" rx="10" stroke="#475569" stroke-width="1.5" fill="#ffffff"/>
<text x="230" y="542" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">DSL engine resolves</text>

<rect x="510" y="514" width="240" height="46" rx="10" stroke="#475569" stroke-width="1.5" fill="#ffffff"/>
<text x="630" y="542" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">AI Dungeon Master judges</text>

<!-- DSL/DM → State (bottom=560, state=610, gap=50) -->
<path d="M 230 560 L 390 606" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>
<path d="M 630 560 L 470 606" stroke="#475569" stroke-width="1.3" fill="none" marker-end="url(#arrow)"/>

<!-- Row 6: State changes (y=610) -->
<rect x="300" y="610" width="260" height="44" rx="10" stroke="#475569" stroke-width="1.5" fill="#ffffff"/>
<text x="430" y="637" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#1e293b" text-anchor="middle">State changes</text>

<!-- Loop back -->
<path d="M 560 632 L 730 632 C 860 632, 860 154, 730 154 L 560 154" stroke="#94A3B8" stroke-width="1.8" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow-loop)"/>
<text x="838" y="400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" text-anchor="middle" transform="rotate(90, 838, 400)">next tick</text>
</svg>
